grumphp:
    tasks:
        phpstan:
            configuration: phpstan.neon.dist
            memory_limit: '-1'
        phpcsfixer:
            config: .php-cs-fixer.dist.php
            allow_risky: true
        phpunit:
            config_file: phpunit.xml.dist
            always_execute: true
        # In-process deptrac task conflicts with deptrac/deptrac nested vendor (ComposerAutoloaderInit duplicate). Run via make subprocess.
        deptrac:
            metadata:
                task: make
            task: deptrac
        infection:
            configuration: infection.json5
            min_msi: 70
            min_covered_msi: 70
            only_covered: true
            threads: 4
