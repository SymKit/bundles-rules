deptrac:
  paths:
    - src/

  layers:
    - name: Contract
      collectors:
        - type: directory
          value: src/Composer/Contract/.*

    - name: Context
      collectors:
        - type: directory
          value: src/Composer/Context/.*

    - name: Installer
      collectors:
        - type: directory
          value: src/Composer/Installer/.*

    - name: Root
      collectors:
        - type: directory
          value: src/Composer/[^/]*$

  ruleset:
    Contract:
      - Context
    Context:
      - Contract
    Installer:
      - Contract
      - Context
    Root:
      - Contract
      - Context
      - Installer
